            document.querySelectorAll(".delete-position").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const positionId = e.target.closest(".position").dataset.positionId;
                    const moduleId = e.target.closest(".module").dataset.moduleId;
                    const module = modules.find(m => m.id == moduleId);
                    const position = module.positions.find(p => p.id == positionId);
                    showConfirm(`确定删除岗位 "${position.name}" ？`, confirmed => confirmed && deletePosition(moduleId, positionId));
                });
            });

            // 添加成员
            document.querySelectorAll(".add-staff").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const positionId = e.target.closest(".position").dataset.positionId;
                    const moduleId = e.target.closest(".module").dataset.moduleId;
                    currentModuleId = moduleId;
                    currentPositionId = positionId;
                    currentStaffId = null;
                    isEditingStaff = false;
                    currentRoles = [];
                    currentAvatar = null;
                    document.getElementById("staff-modal-title").textContent = "添加新成员";
                    document.getElementById("staff-name").value = "";
                    document.getElementById("staff-notes").value = "";
                    document.getElementById("staff-avatar-preview").style.backgroundImage = "";
                    document.getElementById("staff-avatar-preview").innerHTML = '<i class="fas fa-user"></i>';
                    renderRoles();
                    renderSiteManagementOptions();
                    renderSiteGroupsOverview();
                    renderSiteOverview();
                    openModal("staff-modal");
                });
            });

            // 成员点击详情
            document.querySelectorAll(".staff-member").forEach(member => {
                member.addEventListener("click", (e) => {
                    if (e.target.closest(".delete-staff")) return;
                    const staffId = member.dataset.staffId;
                    const positionId = member.closest(".position").dataset.positionId;
                    const moduleId = member.closest(".module").dataset.moduleId;
                    const module = modules.find(m => m.id == moduleId);
                    const position = module.positions.find(p => p.id == positionId);
                    const staff = position.staff.find(s => s.id == staffId);
                    showStaffDetails(staff, moduleId, positionId, staffId);
                });
            });

            // 删除成员
            document.querySelectorAll(".delete-staff").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const staffId = e.target.closest(".staff-member").dataset.staffId;
                    const positionId = e.target.closest(".position").dataset.positionId;
                    const moduleId = e.target.closest(".module").dataset.moduleId;
                    const module = modules.find(m => m.id == moduleId);
                    const position = module.positions.find(p => p.id == positionId);
                    const staff = position.staff.find(s => s.id == staffId);
                    showConfirm(`确定删除成员 "${staff.name}" ？`, confirmed => confirmed && deleteStaff(moduleId, positionId, staffId));
                });
            });
        }

        // 显示成员详情
        function showStaffDetails(staff, moduleId, positionId, staffId) {
            currentModuleId = moduleId;
            currentPositionId = positionId;
            currentStaffId = staffId;
            document.getElementById("staff-details-title").textContent = staff.name;
            document.getElementById("detail-name").value = staff.name;
            document.getElementById("detail-notes").value = staff.notes || "";
            
            currentDetailAvatar = staff.avatar || null;
            if (staff.avatar) {
                document.getElementById("detail-avatar-preview").style.backgroundImage = `url('${staff.avatar}')`;
                document.getElementById("detail-avatar-preview").style.backgroundSize = "cover";
                document.getElementById("detail-avatar-preview").style.backgroundPosition = "center";
                document.getElementById("detail-avatar-preview").innerHTML = '';
            } else {
                document.getElementById("detail-avatar-preview").style.backgroundImage = '';
                document.getElementById("detail-avatar-preview").innerHTML = '<i class="fas fa-user"></i>';
            }
            
            detailRoles = [...(staff.roles || [])];
            renderDetailRoles();
            renderSiteManagementOptions();
            renderSiteGroupsOverview();
            renderSiteOverview();
            openModal("staff-details-modal");
        }

        // 角色管理
        function toggleRoleSelection(role, selectedRoles) {
            ensureSiteExists(role);
            const index = selectedRoles.indexOf(role);
            if (index !== -1) {
                selectedRoles.splice(index, 1);
            } else {
                selectedRoles.push(role);
            }
            selectedRoles.sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
        }

        function updateRolePickerButton(buttonId, selectedRoles) {
            const button = document.getElementById(buttonId);
            if (!button) return;
            button.innerHTML = `<i class="fas fa-chevron-down"></i> ${selectedRoles.length ? `已选 ${selectedRoles.length} 个角色` : '选择角色'}`;
        }

        function renderRolePicker(mode, selectedRoles) {
            const groupContainer = document.getElementById(mode === 'detail' ? 'detail-role-group-picker' : 'role-group-picker');
            const siteContainer = document.getElementById(mode === 'detail' ? 'detail-role-site-picker' : 'role-site-picker');
            if (!groupContainer || !siteContainer) return;

            const selectedSet = new Set(selectedRoles);
            groupContainer.innerHTML = siteGroups.map(group => {
                const checked = group.sites.every(site => selectedSet.has(site));
                return `
                    <label class="role-picker-item">
                        <input type="checkbox" class="role-group-checkbox" data-role-group="${group.name}" ${checked ? 'checked' : ''}>
                        <span>${group.name}</span>
                    </label>
                `;
            }).join('');

            const standaloneSites = sites.filter(site => !siteGroups.some(group => group.sites.includes(site)));
            const pickerSites = [...new Set([...standaloneSites, ...selectedRoles.filter(role => !sites.includes(role))])];
            siteContainer.innerHTML = pickerSites.map(site => `
                <label class="role-picker-item">
                    <input type="checkbox" class="role-site-checkbox" data-role="${site}" ${selectedSet.has(site) ? 'checked' : ''}>
                    <span>${site}</span>
                </label>
            `).join('');

            groupContainer.querySelectorAll('.role-group-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const group = siteGroups.find(item => item.name === e.target.dataset.roleGroup);
                    if (!group) return;
                    const shouldSelect = e.target.checked;
                    group.sites.forEach(site => {
                        if (shouldSelect && !selectedRoles.includes(site)) {
                            selectedRoles.push(site);
                        } else if (!shouldSelect) {
                            const index = selectedRoles.indexOf(site);
                            if (index !== -1) selectedRoles.splice(index, 1);
                        }
                    });
                    selectedRoles.sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
                    renderRolePicker(mode, selectedRoles);
                });
            });

            siteContainer.querySelectorAll('.role-site-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    toggleRoleSelection(e.target.dataset.role, selectedRoles);
                    renderRolePicker(mode, selectedRoles);
                });
            });

            updateRolePickerButton(mode === 'detail' ? 'detail-role-picker-toggle' : 'role-picker-toggle', selectedRoles);
        }

        function getRoleDisplayItems(roles) {
            const selectedRoles = Array.isArray(roles) ? roles.filter(Boolean) : [];
            const roleSet = new Set(selectedRoles);
            const items = [];

            siteGroups.forEach(group => {
                const matchedSites = group.sites.filter(site => roleSet.has(site));
                if (matchedSites.length) {
                    items.push({ type: 'group', name: group.name, sites: matchedSites });
                }
            });

            selectedRoles.forEach(role => {
                const belongsToGroup = siteGroups.some(group => group.sites.includes(role));
                if (!belongsToGroup) {
                    items.push({ type: 'site', name: role });
                }
            });

            return items;
        }

        function removeRole(role, roleType) {
            if (roleType === 'group') {
                const group = siteGroups.find(item => item.name === role);
                if (group) {
                    currentRoles = currentRoles.filter(item => !group.sites.includes(item));
                }
            } else {
                const index = currentRoles.indexOf(role);
                if (index !== -1) currentRoles.splice(index, 1);
            }
            renderRoles();
        }

        function renderRoles() {
            const container = document.getElementById("roles-container");
            container.innerHTML = "";
            const displayItems = getRoleDisplayItems(currentRoles);
            displayItems.forEach(item => {
                const el = document.createElement("div");
                el.className = "role-tag";
                el.style.backgroundColor = item.type === 'group' ? generateRoleColor(item.name) : generateRoleColor(item.name);
                if (item.type === 'group') {
                    el.innerHTML = `
                        <div class="role-tag-content">
                            <div class="role-tag-title">${item.name}</div>
                            <div class="role-tag-sub-list">${item.sites.map(site => `<span class="role-tag-sub-chip">${site}</span>`).join('')}</div>
                        </div>
                        <button class="role-remove" data-role="${item.name}" data-role-type="group"><i class="fas fa-times"></i></button>
                    `;
                } else {
                    el.innerHTML = `<span>${item.name}</span><button class="role-remove" data-role="${item.name}" data-role-type="site"><i class="fas fa-times"></i></button>`;
                }
                container.appendChild(el);
            });
            document.querySelectorAll("#roles-container .role-remove").forEach(btn => {
                btn.addEventListener("click", () => removeRole(btn.dataset.role, btn.dataset.roleType));
            });
            renderRolePicker('staff', currentRoles);
        }

        function removeDetailRole(role, roleType) {
            if (roleType === 'group') {
                const group = siteGroups.find(item => item.name === role);
                if (group) {
                    detailRoles = detailRoles.filter(item => !group.sites.includes(item));
                }
            } else {
                const index = detailRoles.indexOf(role);
                if (index !== -1) detailRoles.splice(index, 1);
            }
            renderDetailRoles();
        }

        function renderDetailRoles() {
            const container = document.getElementById("detail-roles-container");
            container.innerHTML = "";
            const displayItems = getRoleDisplayItems(detailRoles);
            displayItems.forEach(item => {
                const el = document.createElement("div");
                el.className = "role-tag";
                el.style.backgroundColor = item.type === 'group' ? generateRoleColor(item.name) : generateRoleColor(item.name);
                if (item.type === 'group') {
                    el.innerHTML = `
                        <div class="role-tag-content">
                            <div class="role-tag-title">${item.name}</div>
                            <div class="role-tag-sub-list">${item.sites.map(site => `<span class="role-tag-sub-chip">${site}</span>`).join('')}</div>
                        </div>
                        <button class="role-remove" data-role="${item.name}" data-role-type="group"><i class="fas fa-times"></i></button>
                    `;
                } else {
                    el.innerHTML = `<span>${item.name}</span><button class="role-remove" data-role="${item.name}" data-role-type="site"><i class="fas fa-times"></i></button>`;
                }
                container.appendChild(el);
            });
            document.querySelectorAll("#detail-roles-container .role-remove").forEach(btn => {
                btn.addEventListener("click", () => removeDetailRole(btn.dataset.role, btn.dataset.roleType));
            });
            renderRolePicker('detail', detailRoles);
        }

        function renderSiteManagementOptions(selectedSites = []) {
            const container = document.getElementById("site-group-options");
            if (!container) return;
            if (!sites.length) {
                container.innerHTML = '<div class="empty-placeholder" style="padding: 8px 0; font-size: 0.9rem;">暂无站点，请先添加站点</div>';
                return;
            }
            const selectedSet = new Set(selectedSites);
            container.innerHTML = sites.map(site => `
                <label class="role-picker-item">
                    <input type="checkbox" class="site-management-checkbox" data-site="${site}" ${selectedSet.has(site) ? 'checked' : ''}>
                    <span>${site}</span>
                </label>
            `).join('');
        }

        function toggleSiteGroupForm(show, groupName = null) {
            const form = document.getElementById("site-group-form");
            if (!form) return;
            form.style.display = show ? "block" : "none";
            if (show) {
                const group = siteGroups.find(item => item.name === (groupName || editingGroupName));
                document.getElementById("site-group-name").value = group ? group.name : "";
                renderSiteManagementOptions(group ? group.sites : []);
            } else {
                editingGroupName = null;
                document.getElementById("site-group-name").value = "";
                document.querySelectorAll("#site-group-options .site-management-checkbox").forEach(box => box.checked = false);
            }
        }

        function toggleSiteForm(show, siteName = null) {
            const form = document.getElementById("site-form");
            if (!form) return;
            form.style.display = show ? "block" : "none";
            if (show) {
                editingSiteName = siteName || editingSiteName;
                document.getElementById("site-name").value = siteName || "";
            } else {
                editingSiteName = null;
                document.getElementById("site-name").value = "";
            }
        }

        function renderSiteGroupsOverview() {
            const container = document.getElementById("site-group-overview");
            if (!container) return;
            if (!siteGroups.length) {
                container.innerHTML = '<div class="empty-placeholder" style="padding: 8px 0; font-size: 0.9rem;">暂无分组</div>';
                return;
            }
            container.innerHTML = siteGroups.map(group => `
                <div class="site-group-item">
                    <div class="site-group-header">
                        <button type="button" class="site-group-toggle" data-group-name="${group.name}">
                            <span>${group.name}</span>
                            <i class="fas fa-chevron-right"></i>
                        </button>
                        <div class="site-group-actions">
                            <button type="button" class="site-group-action-btn edit" data-group-name="${group.name}">编辑</button>
                            <button type="button" class="site-group-action-btn delete" data-group-name="${group.name}">删除</button>
                        </div>
                    </div>
                    <div class="site-group-sites">
                        ${group.sites.map(site => `<span class="site-pill">${site}</span>`).join('')}
                    </div>
                </div>
            `).join('');

            container.querySelectorAll('.site-group-toggle').forEach(btn => {
                btn.addEventListener('click', () => {
                    const item = btn.closest('.site-group-item');
                    item.classList.toggle('active');
                });
            });

            container.querySelectorAll('.site-group-action-btn.edit').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    editingGroupName = btn.dataset.groupName;
                    toggleSiteGroupForm(true, btn.dataset.groupName);
                    toggleSiteForm(false);
                });
            });

            container.querySelectorAll('.site-group-action-btn.delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const groupName = btn.dataset.groupName;
                    showConfirm(`确定删除分组 "${groupName}" ？`, (confirmed) => {
                        if (!confirmed) return;
                        siteGroups = siteGroups.filter(group => group.name !== groupName);
                        saveSiteSettings();
                        refreshSiteRelatedViews();
                        showAlert(`分组 "${groupName}" 已删除`);
                    });
                });
            });
        }

        function renderSiteOverview() {
            const container = document.getElementById("site-overview");
            if (!container) return;
            if (!sites.length) {
                container.innerHTML = '<div class="empty-placeholder" style="padding: 8px 0; font-size: 0.9rem;">暂无站点</div>';
                return;
            }
            container.innerHTML = sites.map(site => `
                <div class="site-list-item">
                    <span class="site-pill">${site}</span>
                    <button type="button" class="site-action-btn" data-site="${site}">删除</button>
                </div>
            `).join('');

            container.querySelectorAll('.site-action-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const siteName = btn.dataset.site;
                    showConfirm(`确定删除站点 "${siteName}" ？`, (confirmed) => {
                        if (!confirmed) return;
                        sites = sites.filter(site => site !== siteName);
                        siteGroups = siteGroups.map(group => ({ ...group, sites: (group.sites || []).filter(site => site !== siteName) })).filter(group => group.sites && group.sites.length > 0);
                        currentRoles = currentRoles.filter(role => role !== siteName);
                        detailRoles = detailRoles.filter(role => role !== siteName);
                        saveSiteSettings();
                        saveToLocalStorage();
                        refreshSiteRelatedViews();
                        showAlert(`站点 "${siteName}" 已删除`);
                    });
                });
            });
        }

        function setActiveSiteTab(tab) {
            document.querySelectorAll('.site-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.querySelectorAll('.site-tab-panel').forEach(panel => {
                panel.classList.toggle('active', panel.id === `site-tab-${tab}`);
            });
        }

        function refreshSiteRelatedViews() {
            renderSiteManagementOptions();
            renderSiteGroupsOverview();
            renderSiteOverview();
            renderRoles();
            renderDetailRoles();
            renderModules();
            updateStats();
        }

        function saveSiteGroup() {
            const groupName = document.getElementById("site-group-name").value.trim();
            const selectedSites = Array.from(document.querySelectorAll("#site-group-options .site-management-checkbox:checked")).map(item => item.dataset.site);
            if (!groupName || selectedSites.length === 0) {
                showAlert("请填写分组名称并至少选择一个站点");
                return;
            }
            selectedSites.forEach(site => ensureSiteExists(site));
            if (editingGroupName) {
                const target = siteGroups.find(group => group.name === editingGroupName);
                if (target) {
                    target.name = groupName;
                    target.sites = selectedSites;
                }
            } else {
                const existingGroup = siteGroups.find(group => group.name === groupName);
                if (existingGroup) {
                    existingGroup.sites = selectedSites;
                } else {
                    siteGroups.push({ name: groupName, sites: selectedSites });
                }
            }
            siteGroups.sort((a, b) => a.name.localeCompare(b.name, 'zh-Hans-CN'));
            saveSiteSettings();
            document.getElementById("site-group-name").value = "";
            toggleSiteGroupForm(false);
            refreshSiteRelatedViews();
            showAlert(`分组 "${groupName}" 已保存`);
        }

        function saveSite() {
            const siteInput = document.getElementById("site-name").value.trim();
            if (!siteInput) {
                showAlert("请填写站点名称");
                return;
            }

            const parsedSites = parseBatchSiteInput(siteInput);
            if (!parsedSites.length) {
                showAlert("请输入有效的站点名称");
                return;
            }

            parsedSites.forEach(site => ensureSiteExists(site));
            document.getElementById("site-name").value = "";
            toggleSiteForm(false);
            refreshSiteRelatedViews();
            showAlert(parsedSites.length > 1 ? `已批量添加 ${parsedSites.length} 个站点` : `站点 "${parsedSites[0]}" 已添加`);
        }

        // 头像上传和一键清除
        function setupAvatarUpload() {
            // 添加成员模态框 - 上传
            document.getElementById("staff-avatar-upload-btn").addEventListener("click", () => {
                document.getElementById("staff-avatar-input").click();
            });
            document.getElementById("staff-avatar-input").addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        currentAvatar = event.target.result;
                        document.getElementById("staff-avatar-preview").style.backgroundImage = `url('${event.target.result}')`;
                        document.getElementById("staff-avatar-preview").style.backgroundSize = "cover";
                        document.getElementById("staff-avatar-preview").style.backgroundPosition = "center";
                        document.getElementById("staff-avatar-preview").innerHTML = '';
                    };
                    reader.readAsDataURL(file);
                }
            });

            // 添加成员模态框 - 清除
            document.getElementById("staff-avatar-clear-btn").addEventListener("click", () => {
                currentAvatar = null;
                document.getElementById("staff-avatar-preview").style.backgroundImage = "";
                document.getElementById("staff-avatar-preview").innerHTML = '<i class="fas fa-user"></i>';
                document.getElementById("staff-avatar-input").value = "";
            });

            // 详情模态框 - 上传
            document.getElementById("detail-avatar-upload-btn").addEventListener("click", () => {
                document.getElementById("detail-avatar-input").click();
            });
            document.getElementById("detail-avatar-input").addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        currentDetailAvatar = event.target.result;
                        document.getElementById("detail-avatar-preview").style.backgroundImage = `url('${event.target.result}')`;
                        document.getElementById("detail-avatar-preview").style.backgroundSize = "cover";
                        document.getElementById("detail-avatar-preview").style.backgroundPosition = "center";
                        document.getElementById("detail-avatar-preview").innerHTML = '';
                    };
                    reader.readAsDataURL(file);
                }
            });

            // 详情模态框 - 清除
            document.getElementById("detail-avatar-clear-btn").addEventListener("click", () => {
                currentDetailAvatar = null;
                document.getElementById("detail-avatar-preview").style.backgroundImage = "";
                document.getElementById("detail-avatar-preview").innerHTML = '<i class="fas fa-user"></i>';
                document.getElementById("detail-avatar-input").value = "";
            });
        }

        // CRUD 操作
        function addNewModule() {
            const name = document.getElementById("module-name").value.trim();
            if (!name) return;
            modules.push({ id: Date.now(), name, positions: [] });
            saveToLocalStorage();
            renderModules();
            updateStats();
            closeAllModals();
            showAlert(`模块 "${name}" 添加成功！`);
        }

        function renameModule(moduleId, newName) {
            if (!newName) return;
            const module = modules.find(m => m.id == moduleId);
            if (module) {
                module.name = newName.trim();
                saveToLocalStorage();
                renderModules();
                showAlert("模块名称已修改");
            }
        }

        function deleteModule(moduleId) {
            modules = modules.filter(m => m.id != moduleId);
            saveToLocalStorage();
            renderModules();
            updateStats();
            showAlert("模块已删除");
        }

        function addNewPosition() {
            const name = document.getElementById("position-name").value.trim();
            if (!name || !currentModuleId) return;
            const module = modules.find(m => m.id == currentModuleId);
            if (module) {
                module.positions.push({ id: Date.now(), name, staff: [] });
                saveToLocalStorage();
                renderModules();
                updateStats();
                closeAllModals();
                showAlert(`岗位 "${name}" 添加成功！`);
            }
        }

        function renamePosition(moduleId, positionId, newName) {
            if (!newName) return;
            const module = modules.find(m => m.id == moduleId);
            const position = module?.positions.find(p => p.id == positionId);
            if (position) {
                position.name = newName.trim();
                saveToLocalStorage();
                renderModules();
                showAlert("岗位名称已修改");
            }
        }

        function deletePosition(moduleId, positionId) {
            const module = modules.find(m => m.id == moduleId);
            if (module) {
                module.positions = module.positions.filter(p => p.id != positionId);
                saveToLocalStorage();
                renderModules();
                updateStats();
                showAlert("岗位已删除");
            }
        }

        function saveStaff() {
            const name = document.getElementById("staff-name").value.trim();
            const notes = document.getElementById("staff-notes").value.trim();
            if (!name || !currentModuleId || !currentPositionId) return;

            const module = modules.find(m => m.id == currentModuleId);
            const position = module?.positions.find(p => p.id == currentPositionId);
            if (!position) return;

            if (isEditingStaff && currentStaffId) {
                const staff = position.staff.find(s => s.id == currentStaffId);
                if (staff) {
                    staff.name = name;
                    staff.roles = [...currentRoles];
                    staff.notes = notes;
                    if (currentAvatar !== null) staff.avatar = currentAvatar;
                }
            } else {
                position.staff.push({
                    id: Date.now(),
                    name,
                    roles: [...currentRoles],
                    notes,
                    avatar: currentAvatar
                });
            }

            saveToLocalStorage();
            renderModules();
            updateStats();
            closeAllModals();
            showAlert("成员保存成功！");
        }

        function saveStaffDetails() {
            const name = document.getElementById("detail-name").value.trim();
            const notes = document.getElementById("detail-notes").value.trim();
            if (!name || !currentModuleId || !currentPositionId || !currentStaffId) return;

            const module = modules.find(m => m.id == currentModuleId);
            const position = module?.positions.find(p => p.id == currentPositionId);
            const staff = position?.staff.find(s => s.id == currentStaffId);
            if (staff) {
                staff.name = name;
                staff.roles = [...detailRoles];
                staff.notes = notes;
                if (currentDetailAvatar !== null) staff.avatar = currentDetailAvatar;
                saveToLocalStorage();
                renderModules();
                closeAllModals();
                showAlert("成员信息已更新");
            }
        }

        function deleteStaff(moduleId, positionId, staffId) {
            const module = modules.find(m => m.id == moduleId);
            const position = module?.positions.find(p => p.id == positionId);
            if (position) {
                position.staff = position.staff.filter(s => s.id != staffId);
                saveToLocalStorage();
                renderModules();
                updateStats();
                showAlert("成员已删除");
            }
        }

        // 设置事件监听器
        function setupEventListeners() {
            document.getElementById("add-module-btn").addEventListener("click", () => openModal("module-modal"));
            document.getElementById("add-site-btn").addEventListener("click", () => {
                renderSiteManagementOptions();
                renderSiteGroupsOverview();
                renderSiteOverview();
                setActiveSiteTab("group");
                openModal("site-modal");
            });
            document.querySelectorAll(".close-btn").forEach(btn => btn.addEventListener("click", closeAllModals));
            document.getElementById("save-module").addEventListener("click", addNewModule);
            document.getElementById("save-position").addEventListener("click", addNewPosition);
            document.getElementById("save-staff").addEventListener("click", saveStaff);
            document.getElementById("save-site-group").addEventListener("click", saveSiteGroup);
            document.getElementById("save-site").addEventListener("click", saveSite);
            document.getElementById("toggle-site-group-form").addEventListener("click", () => {
                editingGroupName = null;
                renderSiteManagementOptions();
                toggleSiteGroupForm(true);
                toggleSiteForm(false);
            });
            document.getElementById("cancel-site-group-form").addEventListener("click", () => toggleSiteGroupForm(false));
            document.getElementById("toggle-site-form").addEventListener("click", () => {
                editingSiteName = null;
                toggleSiteGroupForm(false);
                toggleSiteForm(true);
            });
            document.getElementById("cancel-site-form").addEventListener("click", () => toggleSiteForm(false));
            document.querySelectorAll(".site-tab").forEach(btn => {
                btn.addEventListener("click", () => setActiveSiteTab(btn.dataset.tab));
            });
            document.getElementById("role-picker-toggle").addEventListener("click", () => {
                const panel = document.getElementById("role-picker-panel");
                panel.style.display = panel.style.display === "block" ? "none" : "block";
            });
            document.getElementById("detail-role-picker-toggle").addEventListener("click", () => {
                const panel = document.getElementById("detail-role-picker-panel");
                panel.style.display = panel.style.display === "block" ? "none" : "block";
            });
            document.getElementById("confirm-ok").addEventListener("click", () => {
                if (confirmCallback) confirmCallback(true);
                document.getElementById("confirm-modal").style.display = "none";
            });
            document.getElementById("confirm-cancel").addEventListener("click", () => {
                if (confirmCallback) confirmCallback(false);
                document.getElementById("confirm-modal").style.display = "none";
            });
            document.getElementById("alert-ok").addEventListener("click", () => {
                document.getElementById("alert-modal").style.display = "none";
            });
            document.getElementById("input-save").addEventListener("click", () => {
                const value = document.getElementById("input-value").value.trim();
                if (value && inputCallback) {
                    inputCallback(value);
                    document.getElementById("input-modal").style.display = "none";
                }
            });
            document.getElementById("save-details").addEventListener("click", saveStaffDetails);
            document.getElementById("close-details").addEventListener("click", () => {
                document.getElementById("staff-details-modal").style.display = "none";
            });

            document.addEventListener("click", (e) => {
                if (!e.target.closest('.role-picker-panel') && !e.target.closest('.role-picker-toggle')) {
                    document.querySelectorAll('.role-picker-panel').forEach(panel => panel.style.display = 'none');
                }
            });

            // 头像上传和一键清除
            setupAvatarUpload();
        }

        // 启动
        initApp();
    })();
</script>
