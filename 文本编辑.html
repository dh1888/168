        // ===== 事件监听器设置 =====
        function setupEventListeners() {
          domCache.fileInput.addEventListener("change", handleFileSelect);
          // 顶部工具栏按钮
          if (domCache.btnAddContent) domCache.btnAddContent.addEventListener("click", insertContentFromToolbar);
          if (domCache.btnImage) domCache.btnImage.addEventListener("click", insertImageFromToolbar);
          if (domCache.btnTable) domCache.btnTable.addEventListener("click", insertTableFromToolbar);
          if (domCache.btnOpenFile) domCache.btnOpenFile.addEventListener("click", () => domCache.fileInput.click());
          if (domCache.btnImpExp) domCache.btnImpExp.addEventListener("click", async () => {
            // 使用自定义模态切换导出或导入
            const action = await showCustomModal({ type: 'select', title: '导入 / 导出',  defaultValue: 'export', options: [{value:'export', label:'导出'}, {value:'import', label:'导入'}] });
            if (!action) return;
            if (action === 'export') exportCurrentContent();
            else domCache.importInput.click();
          });
          if (domCache.btnExport) domCache.btnExport.style.display = 'none';
          if (domCache.btnImport) domCache.btnImport.style.display = 'none';
          if (domCache.importInput) domCache.importInput.addEventListener("change", handleImportFile);
          if (domCache.ctxEdit) domCache.ctxEdit.addEventListener("click", editCurrentContextContent);
          if (domCache.ctxInsert) domCache.ctxInsert.addEventListener("click", () => insertAtContext({ defaultType: 'color', insertMode: 'inside' }));
          if (domCache.ctxInsertAfter) domCache.ctxInsertAfter.addEventListener("click", () => insertAtContext({ defaultType: 'color', insertMode: 'after' }));
          if (domCache.ctxH3) domCache.ctxH3.addEventListener("click", () => applyContextStyle("h3"));
          if (domCache.ctxH4) domCache.ctxH4.addEventListener("click", () => applyContextStyle("h4"));
          if (domCache.ctxP) domCache.ctxP.addEventListener("click", () => applyContextStyle("p"));
          if (domCache.ctxColor) domCache.ctxColor.addEventListener("click", () => applyContextStyle("color"));
          if (domCache.ctxDelete) domCache.ctxDelete.addEventListener("click", deleteCurrentContextBlock);
          if (domCache.ctxModify) domCache.ctxModify.addEventListener("click", (ev) => {
            ev.stopPropagation();
            const wrap = domCache.ctxModifyWrap || document.getElementById('ctxModifyWrap');
            if (wrap) wrap.classList.toggle('open');
          });

          // 鼠标悬停在“修改”时展示独立的二级卡片，卡片靠近右键菜单并自动适配视口
          let subcardHideTimer = null;
          function createContextSubcard() {
            if (domCache.contextSubcard) return domCache.contextSubcard;
            const el = document.createElement('div');
            el.id = 'contextSubcard';
            el.className = 'context-subcard';

            const btnH3 = document.createElement('button'); btnH3.textContent = '大标题'; btnH3.addEventListener('click', () => { applyContextStyle('h3'); hideContextMenu(); });
            const btnH4 = document.createElement('button'); btnH4.textContent = '小标题'; btnH4.addEventListener('click', () => { applyContextStyle('h4'); hideContextMenu(); });
            const btnP = document.createElement('button'); btnP.textContent = '段落'; btnP.addEventListener('click', () => { applyContextStyle('p'); hideContextMenu(); });
            const btnColor = document.createElement('button'); btnColor.textContent = '色块'; btnColor.addEventListener('click', () => { applyContextStyle('color'); hideContextMenu(); });

            el.appendChild(btnH3); el.appendChild(btnH4); el.appendChild(btnP); el.appendChild(btnColor);
            document.body.appendChild(el);
            el.addEventListener('mouseenter', () => { if (subcardHideTimer) { clearTimeout(subcardHideTimer); subcardHideTimer = null; } });
            el.addEventListener('mouseleave', () => { scheduleHideSubcard(); });
            domCache.contextSubcard = el;
            return el;
          }

          function showContextSubcard() {
            const menu = domCache.contextMenu;
            if (!menu) return;
            const sub = createContextSubcard();
            sub.style.display = 'block';
            const menuRect = menu.getBoundingClientRect();
            const subRect = sub.getBoundingClientRect();
            let left = menuRect.right + 8;
            let top = menuRect.top;
            if (left + subRect.width + 8 > window.innerWidth) {
              left = menuRect.left - subRect.width - 8;
            }
            if (top + subRect.height + 8 > window.innerHeight) {
              top = Math.max(8, window.innerHeight - subRect.height - 8);
            }
            sub.style.left = `${Math.max(8,left)}px`;
            sub.style.top = `${Math.max(8,top)}px`;
          }

          function scheduleHideSubcard() {
            if (subcardHideTimer) clearTimeout(subcardHideTimer);
            subcardHideTimer = setTimeout(() => {
              if (domCache.contextSubcard) domCache.contextSubcard.style.display = 'none';
              subcardHideTimer = null;
            }, 180);
          }

          if (domCache.ctxModify) {
            domCache.ctxModify.addEventListener('mouseenter', (ev) => {
              ev.stopPropagation();
              showContextSubcard();
            });
            domCache.ctxModify.addEventListener('mouseleave', () => scheduleHideSubcard());
          }

          // 使用事件委托处理图片点击
          domCache.fileContent.addEventListener("click", function (e) {
            // 图片查看器
            if (e.target.classList.contains("thumbnail")) {
              openModal(e.target.src);
              return;
            }

            const colorBlock = e.target.closest(
              ".bgb-block, .bgy-block, .bgr-block, .bgg-block, .custom-color-block"
            );
            if (colorBlock && domCache.fileContent.contains(colorBlock)) {
              e.stopPropagation();
              return;
            }
          });

          domCache.fileContent.addEventListener('dblclick', async function (e) {
            const target = e.target.closest(
              ".h3-heading, .h4-heading, .h5-heading, .p-line, .block-line, .bgb-block, .bgy-block, .bgr-block, .bgg-block, .custom-color-block, .box-block, .table-block"
            );
            if (!target || !domCache.fileContent.contains(target)) return;
            e.preventDefault();
            state.currentContextTarget = target;
            await editCurrentContextContent();
          });

          domCache.fileContent.addEventListener("contextmenu", handleContentContextMenu);
          document.addEventListener("click", function (e) {
            if (
              domCache.contextMenu &&
              !domCache.contextMenu.contains(e.target) &&
              !(domCache.contextSubcard && domCache.contextSubcard.contains(e.target))
            ) {
              hideContextMenu();
            }
          });

          if (domCache.contextMenu) {
            domCache.contextMenu.addEventListener("click", function (e) {
              e.stopPropagation();
            });
          }

          if (domCache.contextSubcard) {
            domCache.contextSubcard.addEventListener("click", function (e) {
              e.stopPropagation();
            });
          }

          // 模态框相关事件
          domCache.closeBtn.addEventListener("click", closeModal);
          domCache.prevBtn.addEventListener("click", showPrevImage);
          domCache.nextBtn.addEventListener("click", showNextImage);
          domCache.zoomInBtn.addEventListener("click", handleZoomIn);
          domCache.zoomOutBtn.addEventListener("click", handleZoomOut);
          domCache.zoomResetBtn.addEventListener("click", handleZoomReset);

          // 图片拖动相关事件
          domCache.modalImage.addEventListener("mousedown", startDrag);
          document.addEventListener("mousemove", handleDrag);
          document.addEventListener("mouseup", endDrag);

          // 新增滚轮缩放事件监听
          domCache.modalImage.addEventListener("wheel", handleWheelZoom, {
            passive: false,
          });

          // 新增点击放大/缩小功能
          domCache.modalImage.addEventListener("click", function (e) {
            // 只有当没有拖动操作时才处理点击
            if (!state.isDragging) {
              e.stopPropagation();
              const now = Date.now();

              // 双击处理
              if (now - state.lastClickTime < 300) {
                if (state.currentScale === 1) {
                  zoomImage(2);
                } else {
                  resetImageZoom();
                }
              }
              state.lastClickTime = now;
            }
            // 重置拖动状态
            state.isDragging = false;
            domCache.modalImage.classList.remove("dragging");
          });

          // 键盘导航
          document.addEventListener("keydown", handleKeyDown);

          // 点击模态框背景关闭
          domCache.imageModal.addEventListener("click", function (e) {
            if (e.target === domCache.imageModal) {
              closeModal();
            }
          });

          // 新增：侧边栏切换事件
          if (domCache.sidebarToggle) {
            domCache.sidebarToggle.addEventListener("click", toggleSidebar);
          }
          domCache.sidebarTitle.addEventListener("click", handleSidebarHeaderClick);
        }

        function handleContentContextMenu(e) {
          const target = e.target.closest(
            ".h3-heading, .h4-heading, .h5-heading, .p-line, .block-line, .bgb-block, .bgy-block, .bgr-block, .bgg-block, .custom-color-block, .box-block, .table-block"
          );
          if (!target || !domCache.fileContent.contains(target)) return;

          e.preventDefault();
          e.stopPropagation();
          state.currentContextTarget = target;

          const menu = domCache.contextMenu;
          menu.style.display = "block";

          const menuWidth = menu.offsetWidth || 170;
          const menuHeight = menu.offsetHeight || 220;
          const padding = 8;
          let left = e.clientX;
          let top = e.clientY;

          if (left + menuWidth + padding > window.innerWidth) {
            left = Math.max(padding, window.innerWidth - menuWidth - padding);
          }

          if (top + menuHeight + padding > window.innerHeight) {
            top = Math.max(padding, window.innerHeight - menuHeight - padding);
          }

          menu.style.left = `${left}px`;
          menu.style.top = `${top}px`;
        }

        function hideContextMenu() {
          if (domCache.contextMenu) {
            domCache.contextMenu.style.display = "none";
            if (domCache.contextSubcard) domCache.contextSubcard.style.display = 'none';
          }
        }

        async function editCurrentContextContent() {
          const target = state.currentContextTarget;
          if (!target) return;
          // 如果是色块，使用 block composer 编辑（支持颜色）
          const isColorBlock = target.classList.contains('bgb-block') || target.classList.contains('bgy-block') || target.classList.contains('bgr-block') || target.classList.contains('bgg-block') || target.classList.contains('custom-color-block');
          if (isColorBlock) {
            let curColor = null;
            if (target.classList.contains('bgb-block')) curColor = '#4096ff';
            else if (target.classList.contains('bgy-block')) curColor = '#fff7cc';
            else if (target.classList.contains('bgr-block')) curColor = '#ffd6d6';
            else if (target.classList.contains('bgg-block')) curColor = '#e6ffed';
            else curColor = target.style.getPropertyValue('--accent-color') || null;
            const existingText = (target.querySelector && target.querySelector('.block-body')) ? target.querySelector('.block-body').textContent.trim() : target.textContent.trim();
            const res = await showBlockComposerModal({ defaultType: 'color', content: existingText, color: curColor });
            if (res) {
              const { type, content, color } = res;
              const newEl = createBlockElement(type === 'color' ? 'color' : type, content, { color });
              if (target.parentNode) target.parentNode.replaceChild(newEl, target);
              rebuildStateFromDOM();
              saveToStorage();
            }
            hideContextMenu();
            return;
          }

          // 如果是图片块（或包含图片），打开图片编辑器
          const imageElements = Array.from(target.querySelectorAll('img.thumbnail'));
          const imgEl = target.tagName === 'IMG' ? target : (imageElements[0] || null);
          if (imgEl) {
            const currentImages = imageElements.map((img) => img.getAttribute('src') || img.src || '').filter(Boolean);
            const newSources = await showImageModal(currentImages);
            if (newSources && newSources.length) {
              const imageRow = target.closest('.image-row');
              const newRow = createImageRow(newSources);
              if (imageRow && imageRow.parentNode) {
                imageRow.parentNode.replaceChild(newRow, imageRow);
              } else if (target.parentNode) {
                target.parentNode.replaceChild(newRow, target);
              } else {
                domCache.fileContent.appendChild(newRow);
              }
              rebuildStateFromDOM();
              saveToStorage();
            }
            hideContextMenu();
            return;
          }

          // 如果是表格块，打开表格编辑器
          const tableEl = target.querySelector && (target.querySelector('table.data-table') || (target.classList && target.classList.contains('table-block') && target.querySelector('table')));
          if (tableEl) {
            // 收集表格信息
            let headerCells = Array.from(tableEl.querySelectorAll('thead th'));
            const hasNoTheadHeaders = !headerCells.length;
            if (hasNoTheadHeaders) {
              const firstRow = tableEl.tBodies[0] ? tableEl.tBodies[0].rows[0] : tableEl.rows[0];
              if (firstRow) {
                headerCells = Array.from(firstRow.cells).filter((cell) => cell.tagName === 'TH');
              }
            }
            headerCells = headerCells.map(th => th.textContent.trim());
            let tbodyRows = tableEl.tBodies[0] ? Array.from(tableEl.tBodies[0].rows) : Array.from(tableEl.rows || []);
            if (hasNoTheadHeaders && headerCells.length && tbodyRows.length) {
              // 第一行作为表头时，编辑时不重复包含到数据中
              tbodyRows = tbodyRows.slice(1);
            }
            const cols = headerCells.length || (tbodyRows.length ? tbodyRows[0].cells.length : 0);
            const lines = tbodyRows.map((r) => Array.from(r.cells).map(c => c.textContent.trim()).join('|')).join('\n');
            const titleText = headerCells.length ? headerCells.join('-') : '';
            const res = await showTableModal({ title: titleText, cols, rows: tbodyRows.length, data: lines });
            if (res) {
              const newTableDiv = createTableBlock(res);
              if (target.parentNode) target.parentNode.replaceChild(newTableDiv, target);
              rebuildStateFromDOM();
              saveToStorage();
            }
            hideContextMenu();
            return;
          }

          const value = await showCustomModal({
            title: "编辑内容",
            message: "请输入内容",
            placeholder: "请输入内容",
            defaultValue: target.textContent.trim(),
          });
          if (value !== null) {
            target.textContent = String(value);
            rebuildStateFromDOM();
            saveToStorage();
          }
          hideContextMenu();
        }

        function deleteCurrentContextBlock() {
          const target = state.currentContextTarget;
          if (!target) return;
          if (confirm && typeof confirm === 'function') {
            // use custom alert instead of native confirm
          }
          // Ask via custom modal
          showCustomModal({ type: 'alert', title: '删除内容', message: '确认删除当前区块？' }).then((ok) => {
            if (ok) {
              const parent = target.parentNode;
              if (parent) parent.removeChild(target);
              rebuildStateFromDOM();
              saveToStorage();
            }
            hideContextMenu();
          });
        }

        async function insertAtContext(opts = {}) {
          const target = state.currentContextTarget;
          if (!target) return;
          const defaultType = opts.defaultType || 'p';
          const insertMode = opts.insertMode || 'inside';
          const res = await showBlockComposerModal({ defaultType: defaultType });
          if (!res) {
            hideContextMenu();
            return;
          }
          const { type, content, color } = res;
          let node = null;

          if (type === 'image') {
            let sources = [];
            if (content) {
              try {
                const parsed = JSON.parse(String(content));
                if (Array.isArray(parsed)) sources = parsed;
              } catch (e) { /* ignore parse error */ }
            }
            if (!sources.length) {
              sources = await showImageModal([]);
            }
            if (!sources || !sources.length) {
              hideContextMenu();
              return;
            }
            const card = document.createElement('div');
            card.className = 'box-block';
            card.appendChild(createImageRow(sources));
            node = card;
          } else if (type === 'whitecard') {
            const card = document.createElement('div');
            card.className = 'box-block';
            const text = String(content || '').trim();
            if (text) {
              card.appendChild(createBlockElement('p', text, { color }));
            }
            node = card;
          } else if (type === 'table') {
            const tableRes = await showTableModal({ title: '', cols: 1, rows: 1, data: '' });
            if (!tableRes) {
              hideContextMenu();
              return;
            }
            node = createTableBlock(tableRes);
          } else {
            node = createBlockElement(type === 'h3' ? 'h3' : type === 'h4' ? 'h4' : type === 'color' ? 'color' : 'p', String(content).trim(), { color });
          }

          const isColorTarget = target.classList.contains('bgb-block') || target.classList.contains('bgy-block') || target.classList.contains('bgr-block') || target.classList.contains('bgg-block') || target.classList.contains('custom-color-block');
          const shouldNest = insertMode === 'inside' && (isColorTarget || target.classList.contains('p-line') || target.classList.contains('box-block'));

          if (shouldNest && target) {
            const childrenContainer = isColorTarget ? target.querySelector('.block-children') : null;
            if (childrenContainer) {
              childrenContainer.appendChild(node);
            } else {
              target.appendChild(node);
            }
          } else if (target.parentNode) {
            target.parentNode.insertBefore(node, target.nextSibling);
          } else {
            domCache.fileContent.appendChild(node);
          }

          if (type === 'h3') {
            state.h3Headings.push({ id: node.id, text: String(content).trim(), icon: getIconForSection(String(content).trim()) });
            updateNavigation();
          }

          rebuildStateFromDOM();
          saveToStorage();
          hideContextMenu();
        }

        async function applyContextStyle(type) {
          const target = state.currentContextTarget;
          if (!target) return;
          const text = target.textContent.trim() || "内容";
          const parent = target.parentNode;

          let newEl = document.createElement("div");
          if (type === "h3") {
            newEl.className = "h3-heading";
            const id = "section-" + state.h3Headings.length;
            newEl.id = id;
          } else if (type === "h4") {
            newEl.className = "h4-heading";
          } else if (type === "p") {
            newEl.className = "p-line";
          } else if (type === "color") {
            const color = await showCustomModal({
              type: "select",
              title: "选择色块颜色",
              message: "请选择新色块的颜色",
              defaultValue: "blue",
              options: [
                { value: "blue", label: "蓝色" },
                { value: "yellow", label: "黄色" },
                { value: "red", label: "红色" },
                { value: "green", label: "绿色" },
              ],
            });
            if (color === null) {
              hideContextMenu();
              return;
            }
            const colorMap = {
              blue: "bgb-block",
              yellow: "bgy-block",
              red: "bgr-block",
              green: "bgg-block",
            };
            newEl.className = colorMap[(String(color) || "blue").toLowerCase()] || "bgb-block";
          } else {
            newEl.className = "block-line";
          }
          newEl.textContent = text;
          if (parent) parent.replaceChild(newEl, target);
          rebuildStateFromDOM();
          saveToStorage();
          hideContextMenu();
        }

        async function exportCurrentContent() {
          const format = await showCustomModal({
            type: "select",
            title: "导出格式",
            message: "请选择导出格式",
            defaultValue: "json",
            options: [
              { value: "json", label: "JSON" },
              { value: "txt", label: "TXT" },
            ],
          });
          if (format === null) return;
          const normalizedFormat = String(format).toLowerCase();
          const data = normalizedFormat === "json"
            ? JSON.stringify(
                {
                  version: 1,
                  exportedAt: new Date().toISOString(),
                  htmlContent: domCache.fileContent.innerHTML,
                  sidebarCollapsed: state.sidebarCollapsed,
                },
                null,
                2
              )
            : domCache.fileContent.innerText || domCache.fileContent.textContent;
          const blob = new Blob([data], { type: normalizedFormat === "json" ? "application/json;charset=utf-8" : "text/plain;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `render-export.${normalizedFormat === "json" ? "json" : "txt"}`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }

        function handleImportFile(e) {
          const file = e.target.files && e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = function (ev) {
            const text = ev.target.result;
            try {
              if (file.name.toLowerCase().endsWith(".json")) {
                const parsed = JSON.parse(text);
                if (parsed && parsed.htmlContent) {
                  domCache.fileContent.innerHTML = parsed.htmlContent;
                  if (parsed.sidebarCollapsed) {
                    state.sidebarCollapsed = true;
                  }
                  rebuildStateFromDOM();
                } else if (parsed && parsed.content) {
                  displayContent(parsed.content);
                } else {
                  displayContent(text);
                }
              } else {
                displayContent(text);
              }
              hideDemoContent();
              saveToStorage();
            } catch (err) {
              showCustomAlertModal("导入失败", "请确认文件内容正确后再试");
            }
          };
          reader.readAsText(file, "UTF-8");
          e.target.value = "";
        }

        // ===== 侧边栏功能 =====
        function toggleSidebar() {
          if (domCache.sidebar.classList.contains("hidden")) return;

          state.sidebarCollapsed = !state.sidebarCollapsed;
          updateSidebarLayout();
        }

        function handleSidebarHeaderClick() {
          if (domCache.sidebar.classList.contains("hidden")) return;
          state.sidebarCollapsed = !state.sidebarCollapsed;
          updateSidebarLayout();
        }

        function updateSidebarLayout() {
          const hasContent = domCache.fileContent.children.length > 0 || domCache.fileContent.textContent.trim().length > 0;
          const shouldShowSidebar = hasContent && state.h3Headings.length > 0;

          if (!shouldShowSidebar) {
            domCache.sidebar.classList.add("hidden");
            if (domCache.sidebarToggle) {
              domCache.sidebarToggle.classList.add("hidden");
            }
            if (domCache.topbar) domCache.topbar.style.left = "0";
            document.body.style.paddingLeft = "20px";
            return;
          }

          domCache.sidebar.classList.remove("hidden");
          if (domCache.sidebarToggle) {
            domCache.sidebarToggle.classList.remove("hidden");
          }
          if (domCache.topbar) {
            domCache.topbar.style.left = state.sidebarCollapsed ? "50px" : "150px";
          }

          if (state.sidebarCollapsed) {
            domCache.sidebar.classList.add("collapsed");
            if (domCache.sidebarToggle) {
              domCache.sidebarToggle.classList.add("collapsed");
            }
            document.body.style.paddingLeft = "70px";
          } else {
            domCache.sidebar.classList.remove("collapsed");
            if (domCache.sidebarToggle) {
              domCache.sidebarToggle.classList.remove("collapsed");
            }
            document.body.style.paddingLeft = "170px";
          }

          if (domCache.sidebarToggle) {
            const toggleIcon = domCache.sidebarToggle.querySelector("span");
            if (toggleIcon) {
              toggleIcon.textContent = state.sidebarCollapsed ? "☰" : "‹";
            }
          }
        }

        function syncViewState() {
          const hasContent = domCache.fileContent.children.length > 0 || domCache.fileContent.textContent.trim().length > 0;
          if (domCache.emptyState) {
            domCache.emptyState.style.display = hasContent ? "none" : "block";
          }
          domCache.fileContent.style.display = hasContent ? "block" : "none";
          updateSidebarLayout();
        }

        // ===== 滚动监听功能 =====
        function setupScrollSpy() {
          window.addEventListener("scroll", function () {
            if (state.h3Headings.length === 0) return;

            const scrollPosition = window.scrollY;
            const windowHeight = window.innerHeight;
            const triggerPosition = windowHeight * 0.3; // 30%位置触发

            // 找到当前应该激活的h3标题
            let activeIndex = -1;

            for (let i = 0; i < state.h3Headings.length; i++) {
              const heading = document.getElementById(state.h3Headings[i].id);
              if (heading) {
                const rect = heading.getBoundingClientRect();
                if (rect.top <= triggerPosition) {
                  activeIndex = i;
                } else {
                  break;
                }
              }
            }

            // 如果找到了新的激活项且与上次不同，则更新
            if (activeIndex !== -1 && activeIndex !== state.lastActiveIndex) {
              state.lastActiveIndex = activeIndex;
              updateActiveNavItem(activeIndex);
            }
          });
        }

        // 更新激活的导航项
        function updateActiveNavItem(index) {
          const navItems = document.querySelectorAll(".nav-item");
          navItems.forEach((item, i) => {
            if (i === index) {
              item.classList.add("active");
            } else {
              item.classList.remove("active");
            }
          });
        }

        // ===== 文件处理功能 =====
        function handleFileSelect(e) {
          const file = e.target.files[0];
          if (!file) return;

          domCache.fileInputContainer.style.display = "none";
          hideDemoContent();

          const reader = new FileReader();

          reader.onload = function (e) {
            const content = e.target.result;
            displayContent(content);
            // 保存到本地
            saveToStorage();
          };

          reader.onerror = function () {
            showCustomAlertModal("文件读取失败", "请重试或检查文件内容");
            resetUI();
          };

          reader.readAsText(file, "UTF-8");
        }

        // 重置UI状态
        function resetUI() {
          domCache.fileInputContainer.style.display = "none";
          showEmptyState();
          domCache.fileContent.innerHTML = "";
          state.allImages = [];
          state.currentImageRow = null;
          state.h3Headings = [];
          state.lastActiveIndex = -1;
          domCache.navList.innerHTML = "";
          syncViewState();
        }

        // 显示空状态说明
        function showEmptyState() {
          if (domCache.emptyState) domCache.emptyState.style.display = "block";
          domCache.fileContent.style.display = "none";
        }

        // 隐藏空状态说明
        function hideDemoContent() {
          if (domCache.emptyState) domCache.emptyState.style.display = "none";
          domCache.fileContent.style.display = "block";
        }

        // ===== 内容显示功能 =====
        function displayContent(content) {
          domCache.fileContent.innerHTML = "";
          state.allImages = []; // 清空图片数组
          state.currentImageRow = null; // 重置当前图片行
          state.h3Headings = []; // 清空h3标题数组
          state.lastActiveIndex = -1; // 重置最后激活的导航项索引

          const lines = content.split("\n");
          let i = 0;
          let pendingImages = [];

          const flushPendingImages = () => {
            if (!pendingImages.length) return;
            const row = createImageRow(pendingImages);
            domCache.fileContent.appendChild(row);
            pendingImages = [];
          };

          while (i < lines.length) {
            const line = lines[i];
            const trimmedLine = line.trim();

            if (trimmedLine === "") {
              i++;
              continue;
            }

            if (isImagePath(trimmedLine)) {
              pendingImages.push(trimmedLine);
              i++;
              continue;
            }

            flushPendingImages();

            // 处理块
            if (
              ["bgb", "bgy", "bgr", "bgg", "box", "ul", "table"].includes(
                trimmedLine
              )
            ) {
              const blockType = trimmedLine;
              let blockLines = [];
              i++;
              while (i < lines.length && lines[i].trim() !== blockType + "d") {
                blockLines.push(lines[i]);
                i++;
              }

              if (blockLines.length > 0) {
                const block =
                  blockType === "ul"
                    ? processListContent(blockLines)
                    : blockType === "table"
                    ? createTable(blockLines)
                    : processBlock(blockLines, blockType);
                domCache.fileContent.appendChild(block);
              }
              i++;
              continue;
            }

            // 处理普通内容
            if (trimmedLine.startsWith("h3")) {
              domCache.fileContent.appendChild(createHeading(line, true));
            } else if (
              trimmedLine.startsWith("h4") ||
              trimmedLine.startsWith("h5")
            ) {
              domCache.fileContent.appendChild(createHeading(line, false));
            } else {
              const lineElement = createLine(line);
              if (lineElement) {
                domCache.fileContent.appendChild(lineElement);
              }
            }

            i++;
          }

          flushPendingImages();
          syncViewState();
        }

        // ===== 标题创建功能 =====
        function createHeading(line, isH3) {
          const heading = document.createElement("div");
          if (isH3) {
            heading.className = "h3-heading";
            const id = "section-" + state.h3Headings.length;
            heading.id = id;

            const headingText = line.substring(2).trim();
            const icon = getIconForSection(headingText);

            // 存储h3标题信息
            state.h3Headings.push({
              id: id,
              text: headingText,
              icon: icon,
            });

            // 更新导航栏
            updateNavigation();
          } else if (line.startsWith("h4")) {
            heading.className = "h4-heading";
          } else if (line.startsWith("h5")) {
            heading.className = "h5-heading";
          }
          heading.textContent = line.substring(2).trim();
          return heading;
        }

        // ===== 导航栏功能 =====
        function updateNavigation() {
          domCache.navList.innerHTML = "";
          const iconStyles = [
            "primary",
            "success circle",
            "warning pulse",
            "error square",
            "purple spin",
            "cyan bounce",
            "magenta",
            "orange tada",
          ];

          const icons = [
            "❓",
            "⭐️",
            "👀",
            "🤔",
            "🔒",
            "🪥",
            "🤑",
            "⏰",
            "📅",
            "✏️",
            "🧠",
            "📝",
            "🎮",
            "📦",
          ];

          state.h3Headings.forEach((heading, index) => {
            const li = document.createElement("li");
            li.className = "nav-item";
            li.dataset.id = heading.id;

            // 图标 - 循环使用不同的样式
            const icon = document.createElement("span");
            const iconStyle = iconStyles[index % iconStyles.length];
            icon.className = `nav-item-icon ${iconStyle}`;
            icon.textContent = icons[index % icons.length];

            // 给图标添加title属性，显示当前标题
            icon.setAttribute("data-tooltip", heading.text);

            // 文本
            const text = document.createElement("span");
            text.className = "nav-item-text";
            text.textContent = heading.text;

            li.appendChild(icon);
            li.appendChild(text);

            li.addEventListener("click", function (e) {
              e.preventDefault();
              scrollToSection(heading.id);
              state.lastActiveIndex = index;
              updateActiveNavItem(index);
            });
            domCache.navList.appendChild(li);
          });

          if (state.h3Headings.length > 0) {
            state.lastActiveIndex = 0;
            updateActiveNavItem(0);
          }
        }

        // 添加一个函数来获取适合的图标
        function getIconForSection(sectionName) {
          const iconMap = {
            规则: "📋",
            审核: "✅",
            警告: "⚠️",
            拒绝: "❌",
            审查: "🔍",
            统计: "📊",
            时间: "⏰",
            特殊: "⭐",
            风险: "🛡️",
            用户: "👤",
            支付: "💳",
            交易: "💰",
            系统: "⚙️",
            日志: "📝",
            设置: "🔧",
            帮助: "❓",
          };

          for (const [key, icon] of Object.entries(iconMap)) {
            if (sectionName.includes(key)) {
              return icon;
            }
          }

          // 默认图标
          return "📄";
        }

        // 滚动到指定章节
        function scrollToSection(id) {
          const element = document.getElementById(id);
          if (element) {
            // 计算正确的偏移量（导航栏高度 + 额外间距）
            const navHeight =
              document.querySelector(".sidebar").offsetHeight || 0;
            const offset = 25; // 你想要的30px间距
            const targetPosition = element.offsetTop - offset;
            const startPosition = window.pageYOffset;
            const distance = targetPosition - startPosition;
            const duration = 500;
            let startTime = null;

            function animation(currentTime) {
              if (startTime === null) startTime = currentTime;
              const timeElapsed = currentTime - startTime;
              const run = easeInOutQuad(
                timeElapsed,
                startPosition,
                distance,
                duration
              );
              window.scrollTo(0, run);
              if (timeElapsed < duration) requestAnimationFrame(animation);
            }

            function easeInOutQuad(t, b, c, d) {
              t /= d / 2;
              if (t < 1) return (c / 2) * t * t + b;
              t--;
              return (-c / 2) * (t * (t - 2) - 1) + b;
            }

            requestAnimationFrame(animation);
          }
        }

        function resolveImageSource(imagePath) {
          const rawPath = String(imagePath || "").trim();
          if (!rawPath) return "";

          if (/^(data:|https?:|blob:|file:)/i.test(rawPath)) {
            return rawPath;
          }

          const normalizedPath = rawPath.replace(/\\/g, "/");

          if (/^[a-zA-Z]:\//.test(normalizedPath)) {
            return `file:///${normalizedPath}`;
          }

          try {
            return new URL(normalizedPath, window.location.href).href;
          } catch (error) {
            return normalizedPath;
          }
        }

        function isImagePath(value) {
          const normalizedLine = String(value || "").trim();
          if (!normalizedLine) return false;
          if (/^(data:|https?:|blob:|file:)/i.test(normalizedLine)) {
            return true;
          }

          const imagePattern = /(?:\.\/|\.\\|\.\.\/|\.\.\\|(?:\\|\/)?image(?:\\|\/))/i;
          const extensionPattern = /\.(png|jpe?g|gif|bmp|webp|svg)(\?.*)?$/i;

          if (extensionPattern.test(normalizedLine)) {
            return (
              normalizedLine.startsWith("./") ||
              normalizedLine.startsWith("../") ||
              normalizedLine.startsWith(".\\") ||
              normalizedLine.startsWith("..\\") ||
              normalizedLine.startsWith("/") ||
              imagePattern.test(normalizedLine)
            );
          }

          return imagePattern.test(normalizedLine) && /^[^\s]+$/.test(normalizedLine);
        }

        function buildImageCandidates(imagePath) {
          const normalizedPath = String(imagePath || "").trim();
          if (!normalizedPath) return [];

          const queryMatch = normalizedPath.match(/(\?.*)$/);
          const query = queryMatch ? queryMatch[1] : "";
          const pathWithoutQuery = queryMatch ? normalizedPath.slice(0, -query.length) : normalizedPath;
          const extensionPattern = /\.(png|jpe?g|gif|bmp|webp|svg)$/i;

          if (extensionPattern.test(pathWithoutQuery) || /^(data:|https?:|blob:|file:)/i.test(pathWithoutQuery)) {
            return [normalizedPath];
          }

          const suffixes = [".png", ".jpg", ".jpeg", ".webp", ".gif", ".bmp", ".svg"];
          return [
            normalizedPath,
            ...suffixes.map((suffix) => `${pathWithoutQuery}${suffix}${query}`),
          ];
        }

        // ===== 内容行创建功能 =====
        function createLine(line, parentElement = null) {
          const normalizedLine = line.trim();

          // 检查是否是图片路径
          if (isImagePath(normalizedLine)) {
            return createImageElement(normalizedLine, parentElement);
          }

          // 如果没有指定父元素，重置currentImageRow
          if (!parentElement) {
            state.currentImageRow = null;
          }

          if (normalizedLine === "") {
            return null;
          }

          const div = document.createElement("div");
          if (normalizedLine.startsWith("P ")) {
            div.className = "p-line";
            div.textContent = normalizedLine.substring(2).trim();
          } else {
            div.className = "block-line";
            div.textContent = normalizedLine;
          }
          return div;
        }

        // ===== 图片处理功能 =====
        function addImageToRow(row, imagePath) {
          const imageContainer = document.createElement("div");
          imageContainer.className = "image-container";
          const img = document.createElement("img");
          img.className = "thumbnail loading";
          img.alt = "内容图片";
          img.dataset.index = state.allImages.length;
          state.allImages.push(imagePath);

          const candidates = buildImageCandidates(imagePath).map(resolveImageSource);
          let attemptIndex = 0;

          function loadNextCandidate() {
            if (attemptIndex >= candidates.length) {
              img.alt = `图片加载失败: ${imagePath}`;
              img.classList.remove("loading");
              return;
            }
            img.src = candidates[attemptIndex];
            attemptIndex += 1;
          }

          img.onload = function () {
            img.classList.remove("loading");
          };
          img.onerror = function () {
            loadNextCandidate();
          };

          loadNextCandidate();
          imageContainer.appendChild(img);
          row.appendChild(imageContainer);
        }

        function createImageRow(images) {
          const row = document.createElement("div");
          row.className = "image-row";

          (images || []).forEach((imagePath) => addImageToRow(row, imagePath));
          return row;
        }

        function createImageElement(imagePath, parentElement = null) {
          const targetParent = parentElement || domCache.fileContent;
          let imageRow = targetParent.lastElementChild;
          if (!imageRow || !imageRow.classList.contains("image-row")) {
            imageRow = document.createElement("div");
            imageRow.className = "image-row";
            targetParent.appendChild(imageRow);
          }

          addImageToRow(imageRow, imagePath);
          return parentElement ? null : imageRow;
        }

        // ===== 表格处理功能 =====
        function createTable(tableLines) {
          const tableDiv = document.createElement("div");
          tableDiv.className = "table-block";

          const table = document.createElement("table");
          table.className = "data-table";

          // 首先确定表格的最大列数
          let maxColumns = 0;
          tableLines.forEach((line) => {
            const normalizedLine = line.replace(/[、·]/g, "|");
            const cells = normalizedLine.split("|").map((cell) => cell.trim());
            if (cells.length > maxColumns) {
              maxColumns = cells.length;
            }
          });

          // 处理每一行
          tableLines.forEach((line, rowIndex) => {
            const row = document.createElement("tr");

            // 统一替换所有分隔符为|，然后分割
            const normalizedLine = line.replace(/[、·]/g, "|");
            let cells = normalizedLine.split("|").map((cell) => cell.trim());

            // 填充缺失的单元格
            while (cells.length < maxColumns) {
              cells.push(""); // 添加空单元格
            }

            // 如果是表头行(以#开头)
            if (line.trim().startsWith("#")) {
              cells[0] = cells[0].substring(1); // 去掉#号

              cells.forEach((cellText) => {
                const th = document.createElement("th");
                th.textContent = cellText || " "; // 空单元格显示空格
                th.setAttribute("scope", "col");
                row.appendChild(th);
              });
            } else {
              cells.forEach((cellText, cellIndex) => {
                const td = document.createElement("td");
                td.textContent = cellText || " "; // 空单元格显示空格
                if (cellIndex === 0) {
                  td.classList.add("first-column");
                }
                row.appendChild(td);
              });
            }

            table.appendChild(row);
          });

          tableDiv.appendChild(table);
          return tableDiv;
        }

        // ===== 块内容处理功能 =====
        function processBlock(lines, blockType) {
          const block = document.createElement("div");
          block.className = blockType + "-block";

          let i = 0;
          while (i < lines.length) {
            const line = lines[i];
            const trimmedLine = line.trim();

            // 处理嵌套块
            if (
              ["bgb", "bgy", "bgr", "bgg", "box", "ul", "table"].includes(
                trimmedLine
              )
            ) {
              const nestedBlockType = trimmedLine;
              let blockLines = [];
              i++;
              while (
                i < lines.length &&
                lines[i].trim() !== nestedBlockType + "d"
              ) {
                blockLines.push(lines[i]);
                i++;
              }

              if (blockLines.length > 0) {
                const nestedBlock =
                  nestedBlockType === "ul"
                    ? processListContent(blockLines)
                    : nestedBlockType === "table"
                    ? createTable(blockLines)
                    : processBlock(blockLines, nestedBlockType);
                block.appendChild(nestedBlock);
              }
              i++;
              continue;
            }

            // 处理标题
            if (trimmedLine.startsWith("h3")) {
              block.appendChild(createHeading(line, true));
              i++;
            } else if (
              trimmedLine.startsWith("h4") ||
              trimmedLine.startsWith("h5")
            ) {
              block.appendChild(createHeading(line, false));
              i++;
            }
            // 处理普通内容（包括图片）
            else {
              const lineDiv = createLine(line, block);
              if (lineDiv) {
                block.appendChild(lineDiv);
              }
              i++;
            }
          }

          return block;
        }

        // ===== 列表内容处理功能 =====
        function processListContent(lines) {
          const listContainer = document.createElement("div");
          listContainer.className = "ul-block";
          const ul = document.createElement("ul");

          let i = 0;
          while (i < lines.length) {
            const line = lines[i];
            const trimmedLine = line.trim();

            // 处理嵌套块
            if (
              ["bgb", "bgy", "bgr", "bgg", "box", "ul", "table"].includes(
                trimmedLine
              )
            ) {
              const blockType = trimmedLine;
              let blockLines = [];
              i++;
              while (i < lines.length && lines[i].trim() !== blockType + "d") {
                blockLines.push(lines[i]);
                i++;
              }

              if (blockLines.length > 0) {
                const block =
                  blockType === "table"
                    ? createTable(blockLines)
                    : blockType === "ul"
                    ? processListContent(blockLines)
                    : processBlock(blockLines, blockType);
                const li = document.createElement("li");
                li.appendChild(block);
                ul.appendChild(li);
              }
              i++;
              continue;
            }

            // 处理标题
            if (trimmedLine.startsWith("h3")) {
              const li = document.createElement("li");
              li.appendChild(createHeading(line, true));
              ul.appendChild(li);
              i++;
            } else if (
              trimmedLine.startsWith("h4") ||
              trimmedLine.startsWith("h5")
            ) {
              const li = document.createElement("li");
              li.appendChild(createHeading(line, false));
              ul.appendChild(li);
              i++;
            }
            // 处理普通内容（包括图片）
            else {
              const lineDiv = createLine(line, listContainer);
              if (!lineDiv) {
                i++;
                continue;
              }
              const li = document.createElement("li");
              li.appendChild(lineDiv);
              ul.appendChild(li);
              i++;
            }
          }

          listContainer.appendChild(ul);
          return listContainer;
        }

        // ===== 图片查看器功能 =====
        function openModal(imgSrc) {
          domCache.loadingIndicator.style.display = "block";
          domCache.imageModal.style.display = "block";

          state.currentImageIndex = state.allImages.indexOf(imgSrc);
          state.currentScale = 1;
          state.translateX = 0;
          state.translateY = 0;

          domCache.modalImage.onload = function () {
            domCache.loadingIndicator.style.display = "none";
            updateImageInfo();
            updateImageTransform();
          };

          domCache.modalImage.onerror = function () {
            domCache.loadingIndicator.style.display = "none";
            domCache.modalImage.alt = "图片加载失败";
            updateImageInfo();
          };

          domCache.modalImage.src = imgSrc;

          // 预加载下一张图片
          preloadNextImage();
        }

        // 预加载下一张图片
        function preloadNextImage() {
          const nextIndex =
            (state.currentImageIndex + 1) % state.allImages.length;
          if (nextIndex !== state.preloadIndex) {
            state.preloadIndex = nextIndex;
            const img = new Image();
            img.src = state.allImages[nextIndex];
          }
        }

        // 关闭模态框
        function closeModal() {
          domCache.imageModal.style.display = "none";
          domCache.modalImage.className = "modal-content";
        }

        // 更新图片信息
        function updateImageInfo() {
          domCache.imageInfo.textContent = `图片 ${
            state.currentImageIndex + 1
          } / ${state.allImages.length}`;
        }

        // 显示上一张图片
        function showPrevImage() {
          if (state.allImages.length === 0) return;

          domCache.loadingIndicator.style.display = "block";
          state.currentImageIndex =
            (state.currentImageIndex - 1 + state.allImages.length) %
            state.allImages.length;
          domCache.modalImage.src = state.allImages[state.currentImageIndex];
          resetImageZoom();
          updateImageInfo();

          // 预加载上一张图片
          const prevIndex =
            (state.currentImageIndex - 1 + state.allImages.length) %
            state.allImages.length;
          const img = new Image();
          img.src = state.allImages[prevIndex];
        }

        // 显示下一张图片
        function showNextImage() {
          if (state.allImages.length === 0) return;

          domCache.loadingIndicator.style.display = "block";
          state.currentImageIndex =
            (state.currentImageIndex + 1) % state.allImages.length;
          domCache.modalImage.src = state.allImages[state.currentImageIndex];
          resetImageZoom();
          updateImageInfo();
          preloadNextImage();
        }

        // 重置图片缩放
        function resetImageZoom() {
          state.currentScale = 1;
          state.translateX = 0;
          state.translateY = 0;
          updateImageTransform();
          domCache.modalImage.className = "modal-content";
        }

        // 缩放图片
        function zoomImage(scale) {
          state.currentScale = Math.max(0.5, Math.min(scale, 3)); // 限制缩放范围
          updateImageTransform();

          // 根据当前缩放状态切换光标样式
          if (state.currentScale === 1) {
            domCache.modalImage.className = "modal-content";
          } else {
            domCache.modalImage.className = "modal-content draggable";
          }
        }

        // 更新图片变换
        function updateImageTransform() {
          domCache.modalImage.style.transform = `translate(calc(-50% + ${state.translateX}px), calc(-50% + ${state.translateY}px)) scale(${state.currentScale})`;
        }

        // 开始拖动
        function startDrag(e) {
          if (state.currentScale > 1) {
            state.isDragging = true;
            state.startX = e.clientX - state.translateX;
            state.startY = e.clientY - state.translateY;
            domCache.modalImage.classList.add("dragging");
            e.preventDefault();
          }
        }

        // 处理拖动
        function handleDrag(e) {
          if (state.isDragging) {
            state.translateX = e.clientX - state.startX;
            state.translateY = e.clientY - state.startY;
            updateImageTransform();
            e.preventDefault();
          }
        }

        // 结束拖动
        function endDrag(e) {
          if (state.isDragging) {
            state.isDragging = false;
            domCache.modalImage.classList.remove("dragging");
            e.stopPropagation();
            e.preventDefault();
          }
        }

        // 处理滚轮缩放
        function handleWheelZoom(e) {
          // 只有图片查看器打开时才处理
          if (domCache.imageModal.style.display !== "block") return;

          e.preventDefault();
          e.stopPropagation();

          // 计算缩放中心点（相对于图片）
          const rect = domCache.modalImage.getBoundingClientRect();
          const centerX = e.clientX - rect.left;
          const centerY = e.clientY - rect.top;

          // 计算当前鼠标位置在图片坐标系中的位置（考虑当前缩放和平移）
          const imgX =
            (centerX - rect.width / 2 - state.translateX) / state.currentScale;
          const imgY =
            (centerY - rect.height / 2 - state.translateY) / state.currentScale;

          // 根据滚轮方向调整缩放比例
          const delta = -e.deltaY;
          const zoomFactor = 0.1; // 缩放速度
          const newScale =
            state.currentScale * (1 + (delta > 0 ? zoomFactor : -zoomFactor));

          // 限制缩放范围
          const clampedScale = Math.max(0.5, Math.min(newScale, 3));
          if (clampedScale === state.currentScale) return;

          // 计算缩放后鼠标位置应保持不变
          const scaleChange = clampedScale / state.currentScale;
          state.translateX = centerX - rect.width / 2 - imgX * clampedScale;
          state.translateY = centerY - rect.height / 2 - imgY * clampedScale;
          state.currentScale = clampedScale;

          // 更新图片变换
          updateImageTransform();

          // 根据当前缩放状态切换光标样式
          if (state.currentScale === 1) {
            domCache.modalImage.className = "modal-content";
          } else {
            domCache.modalImage.className = "modal-content draggable";
          }
        }

        // 处理放大
        function handleZoomIn(e) {
          e.stopPropagation();
          zoomImage(state.currentScale + 0.5);
        }

        // 处理缩小
        function handleZoomOut(e) {
          e.stopPropagation();
          zoomImage(state.currentScale - 0.5);
        }

        // 处理重置缩放
        function handleZoomReset(e) {
          e.stopPropagation();
          resetImageZoom();
        }

        // ===== 键盘事件处理 =====
        function handleKeyDown(event) {
          if (domCache.imageModal.style.display === "block") {
            switch (event.key) {
              case "ArrowLeft":
                showPrevImage();
                break;
              case "ArrowRight":
                showNextImage();
                break;
              case "Escape":
                closeModal();
                break;
              case "+":
              case "=":
                handleZoomIn(event);
                break;
              case "-":
                handleZoomOut(event);
                break;
              case "0":
                handleZoomReset(event);
                break;
            }
          }
        }

        // ===== 初始化应用 =====
        init();
      })();

      (function () {
        let tooltipEl = null;
        let tooltipTimer;

        function showTooltip(target) {
          const text = target.getAttribute("data-tooltip");
          if (!text) return;

          if (!tooltipEl) {
            tooltipEl = document.createElement("div");
            tooltipEl.className = "tooltip";
            document.body.appendChild(tooltipEl);
          }

          tooltipEl.textContent = text;

          // 根据图标类型加不同主题
          tooltipEl.className = "tooltip"; // reset
          if (target.classList.contains("warning")) {
            tooltipEl.classList.add("warning");
          } else if (target.classList.contains("success")) {
            tooltipEl.classList.add("success");
          } else if (target.classList.contains("error")) {
            tooltipEl.classList.add("error");
          } else {
            tooltipEl.classList.add("info");
          }

          // 动态计算位置
          const rect = target.getBoundingClientRect();
          tooltipEl.style.top =
            rect.top + rect.height / 2 + window.scrollY + "px";
          tooltipEl.style.left = rect.right + 10 + window.scrollX + "px";

          tooltipEl.classList.add("show");
        }

        function hideTooltip() {
          if (tooltipEl) tooltipEl.classList.remove("show");
        }

        const sidebar = document.getElementById("sidebar");

        sidebar.addEventListener("mouseover", (e) => {
          if (e.target.classList.contains("nav-item-icon")) {
            tooltipTimer = setTimeout(() => showTooltip(e.target), 100);
          }
        });

        sidebar.addEventListener("mouseout", (e) => {
          if (e.target.classList.contains("nav-item-icon")) {
            clearTimeout(tooltipTimer);
            hideTooltip();
          }
        });

        sidebar.addEventListener("click", () => {
          if (tooltipEl) tooltipEl.classList.remove("show");
        });
      })();
    </script>
